<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TimeTrack">
  <title>TimeTrack Pro</title>
  <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiVGltZVRyYWNrIFBybyIsInNob3J0X25hbWUiOiJUaW1lVHJhY2siLCJzdGFydF91cmwiOiIuIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiIzBhMGEwZiIsInRoZW1lX2NvbG9yIjoiIzBhMGEwZiJ9">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg-dark:#0a0a0f;--bg-card:#12121a;--bg-elevated:#1a1a24;--accent-primary:#00ff88;--accent-secondary:#00ccff;--accent-warning:#ffaa00;--accent-danger:#ff4466;--accent-purple:#aa66ff;--accent-pink:#ff66aa;--text-primary:#fff;--text-secondary:#8888aa;--text-muted:#555566;--border-color:#2a2a3a;--gradient-accent:linear-gradient(135deg,#00ff88 0%,#00ccff 100%);--gradient-purple:linear-gradient(135deg,#aa66ff 0%,#6644ff 100%);--safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom)}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:'Sora',sans-serif;background:var(--bg-dark);color:var(--text-primary);min-height:100vh;overscroll-behavior:none}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(0,255,136,.05) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(0,204,255,.05) 0%,transparent 50%);pointer-events:none;z-index:0}
    #root{position:relative;z-index:1}
    @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
    .loading-spinner{width:50px;height:50px;border:4px solid var(--border-color);border-top-color:var(--accent-primary);border-radius:50%;animation:spin 1s linear infinite}
    .setup-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .setup-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:20px;padding:30px;width:100%;max-width:500px}
    .setup-card h2{font-size:1.2rem;margin-bottom:20px;background:var(--gradient-accent);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .setup-card textarea{width:100%;padding:12px;background:var(--bg-elevated);border:2px solid var(--border-color);border-radius:10px;color:var(--text-primary);font-family:'Space Mono',monospace;font-size:.8rem;resize:none;height:80px}
    .app-container{min-height:100vh;padding-bottom:calc(70px + var(--safe-bottom))}
    .login-container{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .login-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:24px;padding:40px 30px;width:100%;max-width:400px;animation:fadeIn .6s ease-out}
    .logo{text-align:center;margin-bottom:30px}
    .logo h1{font-family:'Space Mono',monospace;font-size:1.8rem;background:var(--gradient-accent);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .logo p{color:var(--text-secondary);margin-top:6px;font-size:.8rem}
    .input-group{margin-bottom:16px}
    .input-group label{display:block;font-size:.7rem;color:var(--text-secondary);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:1px}
    .input-group input,.input-group select,.input-group textarea{width:100%;padding:12px;background:var(--bg-elevated);border:2px solid var(--border-color);border-radius:10px;color:var(--text-primary);font-size:.9rem;font-family:'Sora',sans-serif}
    .input-group input:focus,.input-group select:focus{outline:none;border-color:var(--accent-primary)}
    .input-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .btn{padding:14px 24px;border:none;border-radius:12px;font-family:'Sora',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:all .2s}
    .btn:active{transform:scale(.98)}
    .btn-primary{background:var(--gradient-accent);color:var(--bg-dark)}
    .btn-secondary{background:var(--bg-elevated);color:var(--text-primary);border:2px solid var(--border-color)}
    .btn-danger{background:rgba(255,68,102,.2);color:var(--accent-danger);border:1px solid var(--accent-danger)}
    .btn-success{background:rgba(0,255,136,.2);color:var(--accent-primary);border:1px solid var(--accent-primary)}
    .btn-small{padding:8px 14px;font-size:.7rem}
    .header{display:flex;justify-content:space-between;align-items:center;padding:16px;background:var(--bg-card);border-bottom:1px solid var(--border-color);position:sticky;top:0;z-index:50}
    .header h1{font-family:'Space Mono',monospace;font-size:1rem;background:var(--gradient-accent);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .header-badge{font-size:.6rem;background:var(--accent-warning);color:var(--bg-dark);padding:3px 8px;border-radius:10px;margin-left:8px}
    .page-content{padding:16px}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg-card);border-top:1px solid var(--border-color);display:flex;padding:8px 0;padding-bottom:calc(8px + var(--safe-bottom));z-index:100}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px;color:var(--text-muted);font-size:.55rem;text-transform:uppercase;letter-spacing:.5px;background:none;border:none;cursor:pointer}
    .nav-item.active{color:var(--accent-primary)}
    .nav-item .nav-icon{font-size:1.2rem}
    .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
    .stat-card{background:var(--bg-card);border-radius:16px;padding:20px;text-align:center}
    .stat-card .stat-value{font-family:'Space Mono',monospace;font-size:1.8rem;font-weight:700;background:var(--gradient-accent);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .stat-card .stat-label{font-size:.7rem;color:var(--text-secondary);margin-top:6px;text-transform:uppercase}
    .stat-card.warning .stat-value{background:linear-gradient(135deg,var(--accent-warning),var(--accent-danger));-webkit-background-clip:text}
    .stat-card.info .stat-value{background:linear-gradient(135deg,var(--accent-secondary),var(--accent-purple));-webkit-background-clip:text}
    .section-title{font-size:.75rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:2px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
    .section-title::before{content:'';width:4px;height:16px;background:var(--gradient-accent);border-radius:2px}
    .card{background:var(--bg-card);border-radius:16px;padding:16px;margin-bottom:12px}
    .employee-list{display:flex;flex-direction:column;gap:10px}
    .employee-item{background:var(--bg-card);border-radius:14px;padding:16px;cursor:pointer;transition:all .2s}
    .employee-item:active{transform:scale(.99)}
    .employee-item.inactive{opacity:.5}
    .employee-item .emp-row{display:flex;justify-content:space-between;align-items:center}
    .employee-item .emp-name{font-weight:600;font-size:.95rem}
    .employee-item .emp-id{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--accent-primary)}
    .employee-item .emp-position{font-size:.75rem;color:var(--text-secondary);margin-top:4px}
    .status-badge{display:inline-block;padding:4px 10px;border-radius:12px;font-size:.6rem;font-weight:600;text-transform:uppercase}
    .status-badge.active{background:rgba(0,255,136,.2);color:var(--accent-primary)}
    .status-badge.resigned{background:rgba(255,170,0,.2);color:var(--accent-warning)}
    .status-badge.terminated{background:rgba(255,68,102,.2);color:var(--accent-danger)}
    .detail-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border-color)}
    .detail-row:last-child{border-bottom:none}
    .detail-row .label{font-size:.75rem;color:var(--text-secondary)}
    .detail-row .value{font-size:.85rem;font-family:'Space Mono',monospace;text-align:right;max-width:60%}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:flex-end;justify-content:center;z-index:200}
    .modal{background:var(--bg-card);border-radius:24px 24px 0 0;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
    .modal-header{display:flex;justify-content:space-between;align-items:center;padding:20px;border-bottom:1px solid var(--border-color);position:sticky;top:0;background:var(--bg-card);z-index:1}
    .modal-header h2{font-size:1rem}
    .modal-close{background:none;border:none;color:var(--text-secondary);font-size:1.5rem;padding:0 10px;cursor:pointer}
    .modal-body{padding:20px}
    .calendar{background:var(--bg-elevated);border-radius:14px;padding:16px}
    .calendar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .calendar-header h3{font-size:.9rem;font-family:'Space Mono',monospace}
    .calendar-nav{display:flex;gap:8px}
    .calendar-nav button{background:var(--bg-card);border:1px solid var(--border-color);color:var(--text-primary);width:36px;height:36px;border-radius:10px;font-size:1rem;cursor:pointer}
    .calendar-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:8px}
    .calendar-weekdays span{text-align:center;font-size:.6rem;color:var(--text-muted);padding:8px 0;font-weight:600}
    .calendar-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
    .calendar-day{background:var(--bg-card);border-radius:8px;padding:8px 4px;min-height:60px;cursor:pointer;position:relative;transition:all .2s}
    .calendar-day:active{transform:scale(.95)}
    .calendar-day.empty{background:transparent;cursor:default}
    .calendar-day.today{border:2px solid var(--accent-primary)}
    .calendar-day.selected{background:var(--accent-primary);color:var(--bg-dark)}
    .calendar-day.has-schedule{background:var(--bg-elevated)}
    .calendar-day.has-attendance{border-left:3px solid var(--accent-primary)}
    .calendar-day.rest{background:rgba(255,170,0,.1)}
    .calendar-day .day-num{font-size:.75rem;font-weight:600;text-align:center}
    .calendar-day .day-info{font-size:.5rem;color:var(--accent-secondary);text-align:center;margin-top:2px}
    .calendar-day .day-branch{font-size:.45rem;color:var(--text-muted);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .calendar-day .day-type{font-size:.5rem;color:var(--accent-warning);text-align:center;margin-top:2px}
    .calendar-day .day-present{position:absolute;top:2px;right:2px;font-size:.5rem}
    .tab-toggle{display:flex;background:var(--bg-elevated);border-radius:12px;padding:4px;margin-bottom:20px}
    .tab-toggle button{flex:1;padding:10px;border:none;background:transparent;color:var(--text-secondary);font-size:.8rem;font-weight:500;cursor:pointer;border-radius:10px}
    .tab-toggle button.active{background:var(--gradient-accent);color:var(--bg-dark)}
    .filter-pills{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
    .filter-pill{padding:8px 14px;background:var(--bg-elevated);border-radius:20px;font-size:.7rem;cursor:pointer;transition:all .2s}
    .filter-pill.active{background:var(--gradient-accent);color:var(--bg-dark)}
    .add-form{background:var(--bg-card);border-radius:16px;padding:20px}
    .add-form h3{margin-bottom:16px;font-size:.9rem}
    .emp-select-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
    .emp-select-item{background:var(--bg-elevated);border:2px solid transparent;border-radius:12px;padding:12px 16px;cursor:pointer;transition:all .2s}
    .emp-select-item.selected{border-color:var(--accent-primary);background:rgba(0,255,136,.1)}
    .emp-select-item .name{font-size:.85rem;font-weight:600}
    .emp-select-item .id{font-size:.65rem;color:var(--text-muted);font-family:'Space Mono',monospace}
    .schedule-types{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
    .schedule-type-btn{padding:10px 16px;background:var(--bg-elevated);border:2px solid var(--border-color);border-radius:10px;color:var(--text-secondary);font-size:.75rem;font-weight:600;cursor:pointer}
    .schedule-type-btn.active{border-color:var(--accent-primary);background:rgba(0,255,136,.1);color:var(--accent-primary)}
    .today-list{display:flex;flex-direction:column;gap:10px}
    .today-item{background:var(--bg-card);border-radius:12px;padding:14px;display:flex;justify-content:space-between;align-items:center}
    .today-item .emp-info .name{font-weight:600;font-size:.85rem}
    .today-item .emp-info .branch{font-size:.7rem;color:var(--text-muted);margin-top:2px}
    .today-item .time{font-family:'Space Mono',monospace;color:var(--accent-primary);font-size:.8rem}
    .today-item .no-sched{color:var(--text-muted);font-size:.75rem}
    .branch-list{display:flex;flex-direction:column;gap:10px;margin-top:16px}
    .branch-item{background:var(--bg-card);border-radius:12px;padding:14px;display:flex;justify-content:space-between;align-items:center}
    .branch-item .info h4{font-size:.85rem;margin-bottom:4px}
    .branch-item .info p{font-size:.7rem;color:var(--text-muted)}
    .empty-state{text-align:center;padding:40px 20px;color:var(--text-muted)}
    .empty-state .icon{font-size:2rem;margin-bottom:10px}
    .error-message{color:var(--accent-danger);font-size:.8rem;margin-bottom:16px;text-align:center}
    .success-toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--accent-primary);color:var(--bg-dark);padding:12px 24px;border-radius:30px;font-weight:600;font-size:.85rem;z-index:300;animation:fadeIn .3s ease-out}
    .sync-indicator{position:fixed;top:8px;right:8px;display:flex;align-items:center;gap:6px;font-size:.6rem;color:var(--text-muted);z-index:60;background:var(--bg-card);padding:4px 10px;border-radius:20px}
    .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-primary)}
    .sync-dot.syncing{animation:pulse 1s infinite;background:var(--accent-warning)}
    .sync-dot.offline{background:var(--accent-danger)}
    .time-display{text-align:center;padding:30px 0}
    .time-display .date{font-size:.85rem;color:var(--text-secondary);margin-bottom:8px}
    .time-display .time{font-family:'Space Mono',monospace;font-size:3.5rem;font-weight:700;background:var(--gradient-accent);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .time-display .schedule-info{display:flex;justify-content:center;gap:20px;margin-top:16px}
    .time-display .schedule-item{text-align:center}
    .time-display .schedule-item .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase}
    .time-display .schedule-item .value{font-size:.9rem;font-weight:600;color:var(--accent-secondary)}
    .time-display .no-schedule-notice{margin-top:16px;padding:12px;background:rgba(255,170,0,.1);border-radius:10px;color:var(--accent-warning);font-size:.8rem}
    .time-display .rest-notice{margin-top:20px;padding:20px;background:var(--bg-card);border-radius:16px}
    .time-display .rest-notice .icon{font-size:2rem;margin-bottom:8px}
    .time-display .rest-notice .title{font-size:1.1rem;font-weight:600;color:var(--accent-warning)}
    .time-section{margin-bottom:24px}
    .time-section h3{font-size:.8rem;color:var(--text-secondary);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
    .time-buttons{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .btn-time{background:var(--bg-card);border:2px solid var(--border-color);border-radius:16px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
    .btn-time:disabled{opacity:.5;cursor:not-allowed}
    .btn-time.recorded{border-color:var(--accent-primary);background:rgba(0,255,136,.05)}
    .btn-time.late{border-color:var(--accent-danger);background:rgba(255,68,102,.05)}
    .btn-time .time-value{display:block;font-family:'Space Mono',monospace;font-size:1.3rem;font-weight:700;color:var(--text-primary);margin-bottom:4px}
    .btn-time .time-label{font-size:.7rem;color:var(--text-secondary);text-transform:uppercase}
    .btn-time .badge{position:absolute;top:-8px;right:-8px;padding:4px 8px;border-radius:10px;font-size:.55rem;font-weight:700}
    .btn-time .late-badge{background:var(--accent-danger);color:white}
    .btn-time .loc-badge{background:var(--accent-secondary);color:var(--bg-dark)}
    .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .summary-card{background:var(--bg-card);border-radius:12px;padding:16px;text-align:center}
    .summary-card .value{font-family:'Space Mono',monospace;font-size:1.4rem;font-weight:700}
    .summary-card .label{font-size:.6rem;color:var(--text-secondary);margin-top:4px;text-transform:uppercase}
    .summary-card.late .value{color:var(--accent-danger)}
    .summary-card.pay .value{color:var(--accent-primary)}
    .history-list{display:flex;flex-direction:column;gap:8px}
    .history-item{background:var(--bg-card);border-radius:10px;padding:12px;display:flex;justify-content:space-between;align-items:center}
    .history-item .date{font-size:.8rem;font-weight:500}
    .history-item .hours{font-size:.7rem;color:var(--text-muted)}
    .history-item .pay{font-family:'Space Mono',monospace;color:var(--accent-primary);font-weight:600}
    .clock-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
    .clock-card{background:var(--bg-elevated);border-radius:12px;padding:14px;text-align:center}
    .clock-card .clock-label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px}
    .clock-card .clock-time{font-family:'Space Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--accent-primary)}
    .clock-card .clock-time.empty{color:var(--text-muted)}
    .clock-card.late .clock-time{color:var(--accent-danger)}
    .att-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
    .att-stat{background:var(--bg-card);border-radius:12px;padding:14px;text-align:center}
    .att-stat .value{font-family:'Space Mono',monospace;font-size:1.4rem;font-weight:700}
    .att-stat .label{font-size:.6rem;color:var(--text-secondary);margin-top:4px;text-transform:uppercase}
    .att-stat.hours .value{color:var(--accent-primary)}
    .att-stat.late .value{color:var(--accent-danger)}
    .att-stat.ot .value{color:var(--accent-secondary)}
    .att-stat.pay .value{color:var(--accent-warning)}
    .location-section{margin-top:20px}
    .location-section h4{font-size:.75rem;color:var(--text-secondary);margin-bottom:12px;text-transform:uppercase}
    .location-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .location-card{background:var(--bg-elevated);border-radius:12px;overflow:hidden}
    .location-card .loc-header{padding:10px;text-align:center;font-size:.7rem;color:var(--accent-secondary);text-transform:uppercase;border-bottom:1px solid var(--border-color)}
    .location-card .loc-map{height:120px;background:var(--bg-card)}
    .location-card .loc-map iframe{width:100%;height:100%;border:none}
    .location-card .loc-coords{padding:8px;font-size:.6rem;color:var(--text-muted);text-align:center;font-family:'Space Mono',monospace}
    .location-card .loc-link{display:block;padding:10px;text-align:center;background:var(--bg-card);color:var(--accent-primary);text-decoration:none;font-size:.7rem;font-weight:600}
    .location-card .no-loc{padding:40px 10px;text-align:center;color:var(--text-muted);font-size:.75rem}
    .payroll-emp-list{display:flex;flex-direction:column;gap:10px}
    .payroll-emp-item{background:var(--bg-card);border-radius:14px;padding:16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all .2s}
    .payroll-emp-item:active{transform:scale(.98)}
    .payroll-emp-item .emp-info .name{font-weight:600;font-size:.95rem}
    .payroll-emp-item .emp-info .position{font-size:.75rem;color:var(--text-secondary);margin-top:2px}
    .payroll-emp-item .emp-rate{font-family:'Space Mono',monospace;color:var(--accent-primary);font-size:.85rem}
    .payroll-summary{background:var(--bg-elevated);border-radius:16px;padding:20px;margin-bottom:20px}
    .payroll-summary h3{font-size:.85rem;text-align:center;margin-bottom:8px;color:var(--accent-secondary)}
    .payroll-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .payroll-stat{background:var(--bg-card);border-radius:12px;padding:14px;text-align:center}
    .payroll-stat .value{font-family:'Space Mono',monospace;font-size:1.2rem;font-weight:700;color:var(--accent-primary)}
    .payroll-stat .label{font-size:.6rem;color:var(--text-secondary);margin-top:4px;text-transform:uppercase}
    .payroll-stat.danger .value{color:var(--accent-danger)}
    .payroll-stat.warning .value{color:var(--accent-warning)}
    .payroll-stat.info .value{color:var(--accent-secondary)}
    .payroll-stat.highlight{grid-column:span 2;background:rgba(0,255,136,.1);border:1px solid var(--accent-primary)}
    .payroll-stat.highlight .value{font-size:1.6rem}
    .date-range-picker{background:var(--bg-card);border-radius:16px;padding:20px;margin-bottom:20px}
    .date-range-picker h4{font-size:.8rem;margin-bottom:16px;color:var(--text-secondary)}
    .payroll-table{width:100%;border-collapse:collapse;font-size:.75rem;margin-top:16px}
    .payroll-table th,.payroll-table td{padding:10px 8px;text-align:left;border-bottom:1px solid var(--border-color)}
    .payroll-table th{color:var(--text-muted);font-size:.65rem;text-transform:uppercase}
    .payroll-table .text-right{text-align:right;font-family:'Space Mono',monospace}
    .payroll-table .total-row{background:var(--bg-elevated);font-weight:700}
    .payroll-table .total-row td{color:var(--accent-primary)}
    .export-section{margin-top:20px;text-align:center}
    @media(max-width:380px){.time-display .time{font-size:2.5rem}.stat-grid{grid-template-columns:1fr}.summary-grid{grid-template-columns:repeat(2,1fr)}.payroll-stats{grid-template-columns:1fr}.location-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo}=React;
const ADMIN_PASSWORD='Albert14$';
const getApiUrl=()=>localStorage.getItem('timetrack_api_url')||'';
const api={call:async(action,params={},body=null)=>{const url=new URL(getApiUrl());url.searchParams.set('action',action);Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));const opts={method:body?'POST':'GET'};if(body)opts.body=JSON.stringify(body);const res=await fetch(url.toString(),opts);return res.json()}};

const PH_HOLIDAYS={'01-01':{name:"New Year's Day",type:'regular'},'04-09':{name:'Araw ng Kagitingan',type:'regular'},'05-01':{name:'Labor Day',type:'regular'},'06-12':{name:'Independence Day',type:'regular'},'08-25':{name:"National Heroes' Day",type:'regular'},'11-30':{name:'Bonifacio Day',type:'regular'},'12-25':{name:'Christmas Day',type:'regular'},'12-30':{name:'Rizal Day',type:'regular'},'02-25':{name:'EDSA Revolution',type:'special'},'08-21':{name:'Ninoy Aquino Day',type:'special'},'11-01':{name:"All Saints' Day",type:'special'},'11-02':{name:"All Souls' Day",type:'special'},'12-08':{name:'Immaculate Conception',type:'special'},'12-24':{name:'Christmas Eve',type:'special'},'12-31':{name:"New Year's Eve",type:'special'}};
const isHoliday=(date)=>{const d=new Date(date+'T12:00:00');const key=`${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;return PH_HOLIDAYS[key]||null};

const formatTime=(d)=>{if(!d)return'';try{const date=new Date(d);if(isNaN(date.getTime()))return'';return date.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true})}catch(e){return''}};
const formatTimeExcel=(d)=>{if(!d)return'';try{const date=new Date(d);if(isNaN(date.getTime()))return'';return date.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true})}catch(e){return''}};
const formatTime24=(t)=>{if(!t)return'--:--';if(typeof t==='string'){if(t.includes(':')){const parts=t.split(':');const h=parseInt(parts[0],10);const m=parts[1]||'00';if(isNaN(h))return'--:--';const hour=h%12||12;const ampm=h>=12?'PM':'AM';return`${hour}:${m.toString().padStart(2,'0')} ${ampm}`}}try{const date=new Date(t);if(!isNaN(date.getTime())){const h=date.getHours();const m=date.getMinutes();const hour=h%12||12;const ampm=h>=12?'PM':'AM';return`${hour}:${String(m).padStart(2,'0')} ${ampm}`}}catch(e){}return'--:--'};
const formatDate=(d)=>new Date(d).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
const formatDateLong=(d)=>new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
const formatDateShort=(d)=>new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
const formatDateExcel=(d)=>new Date(d+'T12:00:00').toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});

const getDateKey=(d=new Date())=>{const date=d instanceof Date?d:new Date(d);const year=date.getFullYear();const month=String(date.getMonth()+1).padStart(2,'0');const day=String(date.getDate()).padStart(2,'0');return`${year}-${month}-${day}`};
const normalizeDate=(d)=>{if(!d)return'';if(typeof d==='string'&&/^\d{4}-\d{2}-\d{2}$/.test(d))return d;try{const date=new Date(d);if(isNaN(date.getTime()))return String(d);const year=date.getFullYear();const month=String(date.getMonth()+1).padStart(2,'0');const day=String(date.getDate()).padStart(2,'0');return`${year}-${month}-${day}`}catch(e){return String(d)}};
const getDateRange=(start,end)=>{const dates=[];let current=new Date(start+'T12:00:00');const endDate=new Date(end+'T12:00:00');while(current<=endDate){dates.push(getDateKey(current));current.setDate(current.getDate()+1)}return dates};
const getLast7Days=()=>{const dates=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);dates.push(getDateKey(d))}return dates};

const timeToMin=(t)=>{if(!t)return 0;if(typeof t==='string'&&t.includes(':')){const[h,m]=t.split(':').map(Number);return h*60+(m||0)}try{const date=new Date(t);if(!isNaN(date.getTime()))return date.getHours()*60+date.getMinutes()}catch(e){}return 0};
const calcHours=(s,e)=>s&&e?Math.max(0,(new Date(e)-new Date(s))/3600000):0;
const getLateMin=(actual,sched)=>{if(!actual||!sched)return 0;const a=new Date(actual);return Math.max(0,(a.getHours()*60+a.getMinutes())-timeToMin(sched))};
const getAfternoonLateMin=(mOut,aIn)=>{if(!mOut||!aIn)return 0;return Math.max(0,Math.floor((new Date(aIn)-new Date(mOut))/60000-60))};
const calcPay=(rec,sched,emp,date)=>{const r={basic:0,ot:0,deduct:0,holiday:0,net:0,mLate:0,aLate:0,totalLate:0,workMin:0,otMin:0};if(!emp)return r;if(sched&&sched.type!=='WORK'){if(sched?.type==='VL'){r.basic=emp.hourlyRate*8;r.net=r.basic}return r}if(!rec)return r;const perMin=(emp.hourlyRate*8)/480;const hol=isHoliday(date);const mMin=rec.morningIn&&rec.morningOut?calcHours(rec.morningIn,rec.morningOut)*60:0;const aMin=rec.afternoonIn&&rec.afternoonOut?calcHours(rec.afternoonIn,rec.afternoonOut)*60:0;r.workMin=mMin+aMin;r.otMin=Math.max(0,r.workMin-480);if(sched){r.mLate=getLateMin(rec.morningIn,sched.morningIn);r.aLate=getAfternoonLateMin(rec.morningOut,rec.afternoonIn);r.totalLate=r.mLate+r.aLate}r.basic=(Math.min(r.workMin,480)/60)*emp.hourlyRate;r.deduct=r.totalLate*perMin;r.ot=(r.otMin/60)*emp.hourlyRate*1.25;if(hol&&r.workMin>0)r.holiday=hol.type==='regular'?r.basic:r.basic*0.3;r.net=Math.max(0,r.basic+r.ot+r.holiday-r.deduct);return r};
const getMonthData=(year,month)=>{const firstDay=new Date(year,month,1).getDay();const daysInMonth=new Date(year,month+1,0).getDate();return{firstDay,daysInMonth}};
const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];

const exportPayrollToExcel=(employee,dateFrom,dateTo,payrollData)=>{
  const wb=XLSX.utils.book_new();
  const headerInfo=[['PAYROLL REPORT'],[''],['Employee Name:',employee.name],['Employee ID:',employee.id],['Position:',employee.position||''],['Hourly Rate:','₱'+employee.hourlyRate],['Period:',formatDateExcel(dateFrom)+' - '+formatDateExcel(dateTo)],['Generated:',new Date().toLocaleString('en-US')],['']];
  const columnHeaders=['Date','Day','Schedule Type','Branch','Morning In','Morning Out','Afternoon In','Afternoon Out','Hours Worked','OT Hours','Minutes Late','Basic Pay','OT Pay','Holiday Pay','Deductions','Net Pay'];
  const dataRows=payrollData.days.map(d=>{const att=d.att||{};const dayName=new Date(d.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short'});return[formatDateExcel(d.date),dayName,d.sched?.type||'No Schedule',d.sched?.branch||'',formatTimeExcel(att.morningIn),formatTimeExcel(att.morningOut),formatTimeExcel(att.afternoonIn),formatTimeExcel(att.afternoonOut),(d.pay.workMin/60).toFixed(2),(d.pay.otMin/60).toFixed(2),d.pay.totalLate,d.pay.basic.toFixed(2),d.pay.ot.toFixed(2),d.pay.holiday.toFixed(2),d.pay.deduct.toFixed(2),d.pay.net.toFixed(2)]});
  const totalsRow=['TOTALS','','','','','','','',payrollData.totals.hours.toFixed(2),payrollData.totals.otHours.toFixed(2),payrollData.totals.late,payrollData.totals.basic.toFixed(2),payrollData.totals.ot.toFixed(2),payrollData.totals.holiday.toFixed(2),payrollData.totals.deduct.toFixed(2),payrollData.totals.net.toFixed(2)];
  const summarySection=[[''],['SUMMARY'],['Days Worked:',payrollData.totals.daysWorked],['Total Hours:',payrollData.totals.hours.toFixed(2)],['Overtime Hours:',payrollData.totals.otHours.toFixed(2)],['Total Late (min):',payrollData.totals.late],[''],['Basic Pay:','₱'+payrollData.totals.basic.toFixed(2)],['Overtime Pay:','₱'+payrollData.totals.ot.toFixed(2)],['Holiday Pay:','₱'+payrollData.totals.holiday.toFixed(2)],['Late Deductions:','-₱'+payrollData.totals.deduct.toFixed(2)],[''],['NET PAY:','₱'+payrollData.totals.net.toFixed(2)]];
  const wsData=[...headerInfo,columnHeaders,...dataRows,totalsRow,...summarySection];
  const ws=XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols']=[{wch:12},{wch:6},{wch:12},{wch:15},{wch:12},{wch:12},{wch:12},{wch:12},{wch:10},{wch:10},{wch:10},{wch:12},{wch:10},{wch:12},{wch:12},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws,'Payroll');
  const fileName='Payroll_'+employee.name.replace(/\s+/g,'_')+'_'+dateFrom+'_to_'+dateTo+'.xlsx';
  XLSX.writeFile(wb,fileName);
};

const SetupScreen=({onSetup})=>{const[url,setUrl]=useState('');const[error,setError]=useState('');const[testing,setTesting]=useState(false);const test=async()=>{setTesting(true);setError('');try{const u=new URL(url);u.searchParams.set('action','getEmployees');const res=await fetch(u.toString());const data=await res.json();if(Array.isArray(data)){localStorage.setItem('timetrack_api_url',url);onSetup()}else setError(data.error||'Invalid')}catch(e){setError('Connection failed')}setTesting(false)};return<div className="setup-screen"><div className="setup-card"><h2>⚙️ Setup TimeTrack</h2><p style={{color:'var(--text-secondary)',marginBottom:16}}>Paste your Google Apps Script URL:</p><div className="input-group"><textarea value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://script.google.com/macros/s/.../exec"/></div>{error&&<p className="error-message">{error}</p>}<button className="btn btn-primary" style={{width:'100%'}} onClick={test} disabled={testing||!url}>{testing?'Testing...':'Connect'}</button></div></div>};
const LoadingScreen=()=><div className="loading-screen"><div className="loading-spinner"/><p style={{color:'var(--text-secondary)'}}>Loading...</p></div>;
const SyncIndicator=({status})=><div className={`sync-indicator ${status}`}><div className={`sync-dot ${status}`}/>{status==='syncing'?'Syncing...':status==='synced'?'Synced':'Offline'}</div>;
const TimeButton=({label,time,onClick,disabled,isLate,lateMin,hasLoc})=><button className={`btn-time ${time?(isLate?'late':'recorded'):''}`} onClick={onClick} disabled={disabled}><span className="time-value">{time?formatTime(time):'--:--'}</span><span className="time-label">{label}</span>{time&&isLate&&<span className="badge late-badge">LATE {lateMin}m</span>}{time&&hasLoc&&<span className="badge loc-badge">📍</span>}</button>;

const ScheduleCalendar=({schedules,attendance,year,month,selectedDate,onDayClick,showAttendance})=>{
  const{firstDay,daysInMonth}=getMonthData(year,month);
  const today=getDateKey();
  const days=[];
  for(let i=0;i<firstDay;i++)days.push(<div key={'e'+i} className="calendar-day empty"/>);
  for(let d=1;d<=daysInMonth;d++){
    const ds=year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const sc=schedules.find(s=>normalizeDate(s.date)===ds);
    const att=attendance?attendance.find(a=>normalizeDate(a.date)===ds):null;
    const isToday=ds===today;
    const isSel=ds===selectedDate;
    const hasAtt=att&&att.morningIn;
    days.push(
      <div key={d} className={'calendar-day'+(isToday?' today':'')+(isSel?' selected':'')+(sc?' has-schedule':'')+(hasAtt&&showAttendance?' has-attendance':'')+(sc&&sc.type!=='WORK'?' rest':'')} onClick={()=>onDayClick&&onDayClick(ds)}>
        <div className="day-num">{d}</div>
        {sc&&sc.type==='WORK'&&<><div className="day-info">{formatTime24(sc.morningIn)}</div><div className="day-branch">{sc.branch||''}</div></>}
        {sc&&sc.type!=='WORK'&&<div className="day-type">{sc.type}</div>}
        {hasAtt&&showAttendance&&<div className="day-present">✅</div>}
      </div>
    );
  }
  return<div className="calendar"><div className="calendar-weekdays">{['S','M','T','W','T','F','S'].map((d,i)=><span key={i}>{d}</span>)}</div><div className="calendar-days">{days}</div></div>;
};

const AttendanceDetailModal=({employee,date,attendance,schedule,onClose})=>{
  const att=attendance||{};
  const pay=calcPay(att,schedule,employee,date);
  const hol=isHoliday(date);
  
  const LocationCard=({label,lat,lng})=>{
    if(!lat||!lng)return<div className="location-card"><div className="loc-header">{label}</div><div className="no-loc">📍 No location recorded</div></div>;
    const mapUrl='https://www.openstreetmap.org/export/embed.html?bbox='+(lng-0.002)+','+(lat-0.002)+','+(lng+0.002)+','+(lat+0.002)+'&layer=mapnik&marker='+lat+','+lng;
    const googleUrl='https://www.google.com/maps?q='+lat+','+lng;
    return<div className="location-card">
      <div className="loc-header">{label}</div>
      <div className="loc-map"><iframe src={mapUrl} loading="lazy"/></div>
      <div className="loc-coords">{lat.toFixed(6)}, {lng.toFixed(6)}</div>
      <a href={googleUrl} target="_blank" rel="noopener noreferrer" className="loc-link">📍 Open in Google Maps</a>
    </div>;
  };
  
  return<div className="modal-overlay" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}><div className="modal-header"><h2>📋 Attendance Details</h2><button className="modal-close" onClick={onClose}>×</button></div><div className="modal-body">
    <div style={{textAlign:'center',marginBottom:20}}>
      <div style={{width:50,height:50,background:'var(--gradient-accent)',borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto',fontSize:'1.3rem',fontWeight:700,color:'var(--bg-dark)'}}>{employee.name.charAt(0)}</div>
      <h3 style={{marginTop:10,color:'var(--accent-primary)'}}>{employee.name}</h3>
      <p style={{color:'var(--text-secondary)',fontSize:'.8rem'}}>{formatDateLong(date)}</p>
      {schedule&&<p style={{color:'var(--accent-secondary)',fontSize:'.75rem',marginTop:4}}>{schedule.type==='WORK'?(schedule.branch||'No Branch')+' • '+formatTime24(schedule.morningIn):schedule.type}</p>}
      {hol&&<p style={{color:'var(--accent-warning)',fontSize:'.75rem',marginTop:4}}>🎉 {hol.name} ({hol.type==='regular'?'200%':'130%'})</p>}
    </div>
    
    <div className="clock-grid">
      <div className={'clock-card'+(pay.mLate>0?' late':'')}>
        <div className="clock-label">Morning In</div>
        <div className={'clock-time'+(!att.morningIn?' empty':'')}>{att.morningIn?formatTime(att.morningIn):'--:--'}</div>
        {pay.mLate>0&&<div style={{fontSize:'.65rem',color:'var(--accent-danger)',marginTop:4}}>Late {pay.mLate} min</div>}
      </div>
      <div className="clock-card">
        <div className="clock-label">Morning Out</div>
        <div className={'clock-time'+(!att.morningOut?' empty':'')}>{att.morningOut?formatTime(att.morningOut):'--:--'}</div>
      </div>
      <div className={'clock-card'+(pay.aLate>0?' late':'')}>
        <div className="clock-label">Afternoon In</div>
        <div className={'clock-time'+(!att.afternoonIn?' empty':'')}>{att.afternoonIn?formatTime(att.afternoonIn):'--:--'}</div>
        {pay.aLate>0&&<div style={{fontSize:'.65rem',color:'var(--accent-danger)',marginTop:4}}>Late {pay.aLate} min</div>}
      </div>
      <div className="clock-card">
        <div className="clock-label">Afternoon Out</div>
        <div className={'clock-time'+(!att.afternoonOut?' empty':'')}>{att.afternoonOut?formatTime(att.afternoonOut):'--:--'}</div>
      </div>
    </div>
    
    <div className="att-stats">
      <div className="att-stat hours"><div className="value">{(pay.workMin/60).toFixed(1)}</div><div className="label">Hours Worked</div></div>
      <div className="att-stat late"><div className="value">{pay.totalLate}</div><div className="label">Minutes Late</div></div>
      <div className="att-stat ot"><div className="value">{(pay.otMin/60).toFixed(1)}</div><div className="label">OT Hours</div></div>
      <div className="att-stat pay"><div className="value">₱{pay.net.toFixed(0)}</div><div className="label">Net Pay</div></div>
    </div>
    
    <div className="location-section">
      <h4>📍 Clock-in Locations</h4>
      <div className="location-grid">
        <LocationCard label="Morning In" lat={att.morningInLat} lng={att.morningInLng}/>
        <LocationCard label="Afternoon Out" lat={att.afternoonOutLat} lng={att.afternoonOutLng}/>
      </div>
    </div>
    
    {!att.morningIn&&<div style={{textAlign:'center',padding:20,color:'var(--text-muted)'}}><p>No attendance recorded for this date</p></div>}
  </div></div></div>;
};

const PayrollModal=({employee,attendance,schedules,onClose})=>{
  const[dateFrom,setDateFrom]=useState(()=>{const d=new Date();d.setDate(d.getDate()-6);return getDateKey(d)});
  const[dateTo,setDateTo]=useState(getDateKey());
  const[showCustomRange,setShowCustomRange]=useState(false);
  const[customData,setCustomData]=useState(null);
  
  const getAttendanceForDate=(date)=>attendance.find(a=>a.empId===employee.id&&normalizeDate(a.date)===date);
  const getScheduleForDate=(date)=>schedules.find(s=>s.empId===employee.id&&normalizeDate(s.date)===date);
  
  const last7Days=useMemo(()=>{
    const dates=getLast7Days();
    let daysWorked=0,totalHours=0,totalLate=0,totalOT=0,totalDeduct=0,totalOTPay=0,totalNet=0;
    dates.forEach(date=>{
      const att=getAttendanceForDate(date);
      const sched=getScheduleForDate(date);
      const pay=calcPay(att,sched,employee,date);
      if(pay.workMin>0)daysWorked++;
      totalHours+=pay.workMin/60;
      totalLate+=pay.totalLate;
      totalOT+=pay.otMin/60;
      totalDeduct+=pay.deduct;
      totalOTPay+=pay.ot;
      totalNet+=pay.net;
    });
    return{daysWorked,totalHours,totalLate,totalOT,totalDeduct,totalOTPay,totalNet,startDate:dates[0],endDate:dates[dates.length-1]};
  },[employee,attendance,schedules]);
  
  const generateCustomReport=()=>{
    const dates=getDateRange(dateFrom,dateTo);
    const days=dates.map(date=>{
      const att=getAttendanceForDate(date);
      const sched=getScheduleForDate(date);
      const pay=calcPay(att,sched,employee,date);
      return{date,att,sched,pay};
    });
    const totals=days.reduce((t,d)=>({
      daysWorked:t.daysWorked+(d.pay.workMin>0?1:0),
      hours:t.hours+d.pay.workMin/60,
      otHours:t.otHours+d.pay.otMin/60,
      late:t.late+d.pay.totalLate,
      basic:t.basic+d.pay.basic,
      ot:t.ot+d.pay.ot,
      holiday:t.holiday+d.pay.holiday,
      deduct:t.deduct+d.pay.deduct,
      net:t.net+d.pay.net
    }),{daysWorked:0,hours:0,otHours:0,late:0,basic:0,ot:0,holiday:0,deduct:0,net:0});
    setCustomData({days,totals});
    setShowCustomRange(true);
  };
  
  const handleExport=()=>{
    if(customData){
      exportPayrollToExcel(employee,dateFrom,dateTo,customData);
    }else{
      const dates=getLast7Days();
      const days=dates.map(date=>{
        const att=getAttendanceForDate(date);
        const sched=getScheduleForDate(date);
        const pay=calcPay(att,sched,employee,date);
        return{date,att,sched,pay};
      });
      const totals={daysWorked:last7Days.daysWorked,hours:last7Days.totalHours,otHours:last7Days.totalOT,late:last7Days.totalLate,basic:last7Days.totalNet-last7Days.totalOTPay+last7Days.totalDeduct,ot:last7Days.totalOTPay,holiday:0,deduct:last7Days.totalDeduct,net:last7Days.totalNet};
      exportPayrollToExcel(employee,last7Days.startDate,last7Days.endDate,{days,totals});
    }
  };
  
  return<div className="modal-overlay" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}><div className="modal-header"><h2>💰 Payroll Details</h2><button className="modal-close" onClick={onClose}>×</button></div><div className="modal-body">
    <div style={{textAlign:'center',marginBottom:20}}>
      <div style={{width:60,height:60,background:'var(--gradient-accent)',borderRadius:16,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto',fontSize:'1.5rem',fontWeight:700,color:'var(--bg-dark)'}}>{employee.name.charAt(0)}</div>
      <h3 style={{marginTop:12,color:'var(--accent-primary)'}}>{employee.name}</h3>
      <p style={{color:'var(--text-secondary)',fontSize:'.8rem'}}>{employee.position||'Employee'} • ₱{employee.hourlyRate}/hr</p>
    </div>
    
    <div className="payroll-summary">
      <h3>📊 Last 7 Days Summary</h3>
      <p style={{textAlign:'center',fontSize:'.7rem',color:'var(--text-muted)',marginBottom:16}}>{formatDateShort(last7Days.startDate)} - {formatDateShort(last7Days.endDate)}</p>
      <div className="payroll-stats">
        <div className="payroll-stat"><div className="value">{last7Days.daysWorked}</div><div className="label">Days Worked</div></div>
        <div className="payroll-stat"><div className="value">{last7Days.totalHours.toFixed(1)}</div><div className="label">Total Hours</div></div>

            <tr className="total-row">

};

const Dashboard=({employee,attendance,schedules,onRecordTime,onLogout,syncStatus})=>{
const[now,setNow]=useState(new Date());
const today=getDateKey();
useEffect(()=>{const t=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(t)},[]);

const rec=attendance.find(a=>a.empId===employee.id&&normalizeDate(a.date)===today)||{};
const sched=schedules.find(s=>s.empId===employee.id&&normalizeDate(s.date)===today);
const hol=isHoliday(today);
const pay=calcPay(rec,sched,employee,today);
const history=attendance.filter(a=>a.empId===employee.id).sort((a,b)=>normalizeDate(b.date).localeCompare(normalizeDate(a.date))).slice(0,10);

if(sched&&sched.type!=='WORK'){
  const types={REST:['😴','Rest Day'],VL:['🏖️','Vacation Leave'],LWOP:['📋','LWOP'],SUSPENSION:['⚠️','Suspension']};
  const[icon,title]=types[sched.type]||['📅',sched.type];
  return<div className="app-container"><SyncIndicator status={syncStatus}/><div className="header"><h1>TimeTrack</h1><button className="btn btn-secondary btn-small" onClick={onLogout}>Logout</button></div><div className="page-content"><div className="time-display"><div className="date">{formatDate(now)}</div><div className="time">{now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false})}</div><div className="rest-notice"><div className="icon">{icon}</div><div className="title">{title}</div></div></div></div></div>;
}

return<div className="app-container"><SyncIndicator status={syncStatus}/><div className="header"><h1>TimeTrack</h1><button className="btn btn-secondary btn-small" onClick={onLogout}>Logout</button></div><div className="page-content"><div className="time-display"><div className="date">{formatDate(now)}</div><div className="time">{now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false})}</div>
{sched?<div className="schedule-info"><div className="schedule-item"><div className="label">Time In</div><div className="value">{formatTime24(sched.morningIn)}</div></div><div className="schedule-item"><div className="label">Branch</div><div className="value">{sched.branch||'N/A'}</div></div><div className="schedule-item"><div className="label">Rate</div><div className="value">₱{employee.hourlyRate}/hr</div></div></div>
:<div className="no-schedule-notice">📋 No schedule assigned - You can still clock in</div>}
{hol&&<div style={{marginTop:14,padding:12,background:'rgba(255,170,0,0.1)',borderRadius:10,textAlign:'center',fontSize:'.85rem'}}><span style={{color:'var(--accent-warning)'}}>{hol.name}</span><span style={{marginLeft:8,color:'var(--accent-pink)'}}>{hol.type==='regular'?'200%':'130%'}</span></div>}
</div>

<div className="time-section"><h3>Morning</h3><div className="time-buttons">
<TimeButton label="Time In" time={rec.morningIn} onClick={()=>onRecordTime('morningIn')} disabled={!!rec.morningIn} isLate={pay.mLate>0} lateMin={pay.mLate} hasLoc={rec.morningInLat}/>
<TimeButton label="Time Out" time={rec.morningOut} onClick={()=>onRecordTime('morningOut')} disabled={!rec.morningIn||!!rec.morningOut} hasLoc={rec.morningOutLat}/>
</div></div>

<div className="time-section"><h3>Afternoon</h3><div className="time-buttons">
<TimeButton label="Time In" time={rec.afternoonIn} onClick={()=>onRecordTime('afternoonIn')} disabled={!!rec.afternoonIn||!rec.morningOut} isLate={pay.aLate>0} lateMin={pay.aLate} hasLoc={rec.afternoonInLat}/>
<TimeButton label="Time Out" time={rec.afternoonOut} onClick={()=>onRecordTime('afternoonOut')} disabled={!rec.afternoonIn||!!rec.afternoonOut} hasLoc={rec.afternoonOutLat}/>
</div></div>

<div className="time-section"><h3>Today's Summary</h3><div className="summary-grid"><div className="summary-card"><div className="value">{(pay.workMin/60).toFixed(1)}</div><div className="label">Hours</div></div><div className="summary-card late"><div className="value">{pay.totalLate}</div><div className="label">Late</div></div></div></div>

{history.length>0&&<div className="time-section"><h3>Recent</h3><div className="history-list">{history.map(r=>{const s=schedules.find(x=>x.empId===employee.id&&normalizeDate(x.date)===normalizeDate(r.date));const p=calcPay(r,s,employee,normalizeDate(r.date));return<div key={normalizeDate(r.date)} className="history-item"><div><div className="date">{normalizeDate(r.date)}</div><div className="hours">{(p.workMin/60).toFixed(1)}hrs</div></div></div>})}</div></div>}
</div></div>};

const AdminPanel=({employees,attendance,schedules,branches,onAddEmployee,onSetSchedule,onUpdateStatus,onAddBranch,onDeleteBranch,onLogout,syncStatus})=>{

const[empFilter,setEmpFilter]=useState('active');

const[calMonth,setCalMonth]=useState(new Date().getMonth());
const[assignEmp,setAssignEmp]=useState(null);

const[aCalMonth,setACalMonth]=useState(new Date().getMonth());

const todayScheds=schedules.filter(s=>normalizeDate(s.date)===today);

const totalHoursToday=presentToday.reduce((sum,a)=>{const e=employees.find(x=>x.id===a.empId);const s=schedules.find(x=>x.empId===a.empId&&normalizeDate(x.date)===today);if(!e)return sum;const p=calcPay(a,s,e,today);return sum+p.workMin/60},0);

const handleAddEmp=async()=>{if(!newEmp.name||!newEmp.hourlyRate)return;await onAddEmployee({...newEmp,status:'Active'});setNewEmp({name:'',position:'',hourlyRate:'',dateHired:'',address:'',sss:'',philhealth:'',pagibig:'',phone:''});setShowAddEmp(false);showToast('Employee added!')};
const handleStatusChange=async(id,status)=>{await onUpdateStatus(id,status);showToast('Status updated!')};
const prevMonth=()=>{if(calMonth===0){setCalMonth(11);setCalYear(calYear-1)}else setCalMonth(calMonth-1)};
const nextMonth=()=>{if(calMonth===11){setCalMonth(0);setCalYear(calYear+1)}else setCalMonth(calMonth+1)};
const aPrevMonth=()=>{if(aCalMonth===0){setACalMonth(11);setACalYear(aCalYear-1)}else setACalMonth(aCalMonth-1)};
const aNextMonth=()=>{if(aCalMonth===11){setACalMonth(0);setACalYear(aCalYear+1)}else setACalMonth(aCalMonth+1)};
const handleDaySelect=(d)=>{setSelectedDay(d);const ex=assignEmp?schedules.find(s=>s.empId===assignEmp.id&&normalizeDate(s.date)===d):null;if(ex){setAssignType(ex.type);setAssignTime(ex.morningIn||'08:00');setAssignBranch(ex.branch||branches[0]?.name||'')}else{setAssignType('WORK');setAssignTime('08:00');setAssignBranch(branches[0]?.name||'')}};
const handleSaveSchedule=async()=>{if(!assignEmp||!selectedDay)return;await onSetSchedule({empId:assignEmp.id,date:selectedDay,type:assignType,morningIn:assignType==='WORK'?assignTime:'',branch:assignType==='WORK'?assignBranch:''});showToast('Schedule saved!');setSelectedDay(null)};
const handleAddBranch=async()=>{if(!newBranchName)return;await onAddBranch({name:newBranchName,address:newBranchAddr});setNewBranchName('');setNewBranchAddr('');showToast('Branch added!')};

const handleScheduleDayClick=(date)=>{setAttDetailDate(date)};

return<div className="app-container">
<SyncIndicator status={syncStatus}/>

<h2 style={{marginBottom:20}}>👋 Welcome, Admin</h2>

<div className="stat-card info"><div className="stat-value">{workingToday.length}</div><div className="stat-label">Working Today</div></div>
<div className="stat-card"><div className="stat-value">{presentToday.length}</div><div className="stat-label">Clocked In</div></div>
<div className="stat-card warning"><div className="stat-value">{totalHoursToday.toFixed(1)}</div><div className="stat-label">Hours Today</div></div>
</div>
<div className="section-title">Today's Schedule</div>
<div className="today-list">
{activeEmps.map(emp=>{const sc=todayScheds.find(s=>s.empId===emp.id);const att=attendance.find(a=>a.empId===emp.id&&normalizeDate(a.date)===today);return<div key={emp.id} className="today-item"><div className="emp-info"><div className="name">{emp.name}</div>{sc&&sc.type==='WORK'?<div className="branch">📍 {sc.branch||'No branch'}</div>:<div className="branch">{sc?sc.type:'No schedule'}</div>}</div>{sc&&sc.type==='WORK'?<div className="time">{att?.morningIn?'✅ Present':formatTime24(sc.morningIn)}</div>:<div className="no-sched">{sc?.type||'—'}</div>}</div>})}
{activeEmps.length===0&&<div className="empty-state"><div className="icon">👥</div><p>No active employees</p></div>}
</div>
<div className="section-title" style={{marginTop:24}}>Branches</div>
<div className="branch-list">
{branches.map(b=><div key={b.id} className="branch-item"><div className="info"><h4>{b.name}</h4><p>{b.address||'No address'}</p></div></div>)}
{branches.length===0&&<p style={{color:'var(--text-muted)',textAlign:'center',padding:20}}>No branches yet</p>}
</div>
</div>}

{tab==='employees'&&<div className="page-content">
<div className="tab-toggle"><button className={!showAddEmp?'active':''} onClick={()=>setShowAddEmp(false)}>View All</button><button className={showAddEmp?'active':''} onClick={()=>setShowAddEmp(true)}>+ Add New</button></div>
{!showAddEmp?<>
<div className="filter-pills">{['all','active','resigned','terminated'].map(f=><div key={f} className={'filter-pill'+(empFilter===f?' active':'')} onClick={()=>setEmpFilter(f)}>{f.charAt(0).toUpperCase()+f.slice(1)}</div>)}</div>
<div className="employee-list">
{filteredEmps.map(emp=><div key={emp.id} className={'employee-item'+((emp.status||'Active')!=='Active'?' inactive':'')} onClick={()=>setSelectedEmp(emp)}><div className="emp-row"><div><div className="emp-name">{emp.name}</div><div className="emp-id">{emp.id}</div><div className="emp-position">{emp.position||'Employee'} • ₱{emp.hourlyRate}/hr</div></div><span className={'status-badge '+(emp.status||'Active').toLowerCase()}>{emp.status||'Active'}</span></div></div>)}
{filteredEmps.length===0&&<div className="empty-state"><div className="icon">👤</div><p>No employees found</p></div>}
</div>

<div className="input-row">

<div className="input-group"><label>Phone</label><input value={newEmp.phone} onChange={e=>setNewEmp({...newEmp,phone:e.target.value})} placeholder="09171234567"/></div>

</div>
<div className="input-group"><label>Pag-IBIG</label><input value={newEmp.pagibig} onChange={e=>setNewEmp({...newEmp,pagibig:e.target.value})} placeholder="1234-5678-9012"/></div>
<button className="btn btn-primary" style={{width:'100%',marginTop:16}} onClick={handleAddEmp}>Add Employee</button>
</div>}
{selectedEmp&&<div className="modal-overlay" onClick={()=>setSelectedEmp(null)}><div className="modal" onClick={e=>e.stopPropagation()}><div className="modal-header"><h2>Employee Details</h2><button className="modal-close" onClick={()=>setSelectedEmp(null)}>×</button></div><div className="modal-body">

<div className="input-group" style={{marginTop:16}}><label>Status</label><select value={selectedEmp.status||'Active'} onChange={e=>{handleStatusChange(selectedEmp.id,e.target.value);setSelectedEmp({...selectedEmp,status:e.target.value})}}><option value="Active">✅ Active</option><option value="Resigned">📤 Resigned</option><option value="Terminated">❌ Terminated</option></select></div>
</div></div></div>}
</div>}

{tab==='schedules'&&<div className="page-content">

  <div className="emp-rate">₱{emp.hourlyRate}/hr</div>
</div>)}
{activeEmps.length===0&&<div className="empty-state"><div className="icon">👥</div><p>No active employees</p></div>}
</div>
{payrollEmp&&<PayrollModal employee={payrollEmp} attendance={attendance} schedules={schedules} onClose={()=>setPayrollEmp(null)}/>}
</div>}

{tab==='settings'&&<div className="page-content">
<div className="section-title">Manage Branches</div>
<div className="add-form">
<div className="input-group"><label>Branch Name</label><input value={newBranchName} onChange={e=>setNewBranchName(e.target.value)} placeholder="Main Office"/></div>
<div className="input-group"><label>Address</label><input value={newBranchAddr} onChange={e=>setNewBranchAddr(e.target.value)} placeholder="123 Business St"/></div>
<button className="btn btn-primary" style={{width:'100%'}} onClick={handleAddBranch}>Add Branch</button>
</div>
<div className="branch-list">
{branches.map(b=><div key={b.id} className="branch-item"><div className="info"><h4>{b.name}</h4><p>{b.address||'No address'}</p></div><button className="btn btn-danger btn-small" onClick={()=>{onDeleteBranch(b.id);showToast('Deleted')}}>Delete</button></div>)}
</div>
</div>}

<div className="bottom-nav">
<button className={'nav-item'+(tab==='home'?' active':'')} onClick={()=>setTab('home')}><span className="nav-icon">🏠</span>Home</button>
<button className={'nav-item'+(tab==='employees'?' active':'')} onClick={()=>setTab('employees')}><span className="nav-icon">👥</span>Employees</button>
<button className={'nav-item'+(tab==='schedules'?' active':'')} onClick={()=>setTab('schedules')}><span className="nav-icon">📅</span>Schedules</button>
<button className={'nav-item'+(tab==='assign'?' active':'')} onClick={()=>setTab('assign')}><span className="nav-icon">✏️</span>Assign</button>
<button className={'nav-item'+(tab==='payroll'?' active':'')} onClick={()=>setTab('payroll')}><span className="nav-icon">💰</span>Payroll</button>
<button className={'nav-item'+(tab==='settings'?' active':'')} onClick={()=>setTab('settings')}><span className="nav-icon">⚙️</span>Settings</button>
</div>
{toast&&<div className="success-toast">{toast}</div>}
</div>};

const LoginScreen=({employees,onLogin,onAdminLogin})=>{const[id,setId]=useState('');const[mode,setMode]=useState('employee');const[error,setError]=useState('');const handleLogin=()=>{if(mode==='employee'){const emp=employees.find(e=>e.id.toUpperCase()===id.toUpperCase());if(!emp){setError('Employee not found');return}if((emp.status||'Active')!=='Active'){setError('Account is '+emp.status);return}onLogin(emp)}else{if(id===ADMIN_PASSWORD)onAdminLogin();else setError('Invalid password')}};return<div className="login-container"><div className="login-card"><div className="logo"><h1>TimeTrack</h1><p>Employee Attendance</p></div><div className="tab-toggle"><button className={mode==='employee'?'active':''} onClick={()=>{setMode('employee');setError('')}}>Employee</button><button className={mode==='admin'?'active':''} onClick={()=>{setMode('admin');setError('')}}>Admin</button></div><div className="input-group"><label>{mode==='employee'?'Employee ID':'Password'}</label><input type={mode==='admin'?'password':'text'} value={id} onChange={e=>{setId(e.target.value);setError('')}} onKeyPress={e=>e.key==='Enter'&&handleLogin()} placeholder={mode==='employee'?'EMP-XXXXXX':'••••••'} autoComplete="off"/></div>{error&&<p className="error-message">{error}</p>}<button className="btn btn-primary" style={{width:'100%'}} onClick={handleLogin}>{mode==='employee'?'Clock In':'Login'}</button></div></div>};

const App=()=>{
const[configured,setConfigured]=useState(!!getApiUrl());
const[loading,setLoading]=useState(true);
const[syncStatus,setSyncStatus]=useState('synced');
const[employees,setEmployees]=useState([]);
const[attendance,setAttendance]=useState([]);
const[schedules,setSchedules]=useState([]);
const[branches,setBranches]=useState([]);
const[user,setUser]=useState(null);
const[view,setView]=useState('login');

const loadData=async()=>{if(!getApiUrl())return;setLoading(true);setSyncStatus('syncing');try{const data=await api.call('getAllData');setEmployees(data.employees||[]);setAttendance(data.attendance||[]);setSchedules(data.schedules||[]);setBranches(data.branches||[]);setSyncStatus('synced')}catch(e){setSyncStatus('offline')}setLoading(false)};
useEffect(()=>{if(configured)loadData()},[configured]);

const recordTime=async(field)=>{
  const today=getDateKey();
  const now=new Date().toISOString();
  setSyncStatus('syncing');
  let lat,lng;
  try{const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{enableHighAccuracy:true,timeout:10000}));lat=pos.coords.latitude;lng=pos.coords.longitude}catch(e){}
  try{await api.call('recordTime',{},{empId:user.id,date:today,field,value:now,lat,lng});await loadData()}catch(e){setSyncStatus('offline')}
};

const addEmployee=async(data)=>{setSyncStatus('syncing');try{await api.call('addEmployee',{},data);await loadData()}catch(e){setSyncStatus('offline')}};
const setSchedule=async(data)=>{setSyncStatus('syncing');try{await api.call('setSchedule',{},data);await loadData()}catch(e){setSyncStatus('offline')}};
const updateStatus=async(empId,status)=>{setSyncStatus('syncing');try{await api.call('updateEmployeeStatus',{},{id:empId,status});await loadData()}catch(e){setSyncStatus('offline')}};
const addBranch=async(data)=>{setSyncStatus('syncing');try{await api.call('addBranch',{},data);await loadData()}catch(e){setSyncStatus('offline')}};
const deleteBranch=async(id)=>{setSyncStatus('syncing');try{await api.call('deleteBranch',{},{id});await loadData()}catch(e){setSyncStatus('offline')}};
const logout=()=>{setUser(null);setView('login')};

if(!configured)return<SetupScreen onSetup={()=>setConfigured(true)}/>;
if(loading)return<LoadingScreen/>;
if(view==='admin')return<AdminPanel employees={employees} attendance={attendance} schedules={schedules} branches={branches} onAddEmployee={addEmployee} onSetSchedule={setSchedule} onUpdateStatus={updateStatus} onAddBranch={addBranch} onDeleteBranch={deleteBranch} onLogout={logout} syncStatus={syncStatus}/>;
if(view==='employee'&&user)return<Dashboard employee={user} attendance={attendance} schedules={schedules} onRecordTime={recordTime} onLogout={logout} syncStatus={syncStatus}/>;
return<LoginScreen employees={employees} onLogin={e=>{setUser(e);setView('employee')}} onAdminLogin={()=>setView('admin')}/>};

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
